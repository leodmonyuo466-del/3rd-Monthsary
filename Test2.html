
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean · 3rd Monthsary</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&family=Dancing+Script:wght@400;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --abyss:#020B18;--deep:#0A2A4A;--ocean:#0D3B6E;--surface:#1A5C9A;
  --glow:#00D4FF;--seafoam:#4FFFD4;--pearl:#E8F4F8;--coral:#FF6B8A;
  --gold:#FFD166;--rose:#FF8FAB;--violet:#C77DFF;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--abyss);color:var(--pearl)}
.page{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.7s ease;z-index:1}
.page.active{opacity:1;pointer-events:all;z-index:10}
#shared-bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,#0D3B6E 0%,#061628 40%,#020B18 100%);transition:background 1.5s ease}
.bg-gradient.p2{background:radial-gradient(ellipse at 60% 30%,#1A0A2E 0%,#0A1628 35%,#020810 100%)}
.bg-gradient.p3{background:radial-gradient(ellipse at 50% 60%,#001428 0%,#020C1A 50%,#010608 100%)}
.bg-gradient.music{background:radial-gradient(ellipse at 20% 50%,#001830 0%,#010810 60%,#000508 100%)}
.bg-gradient.letter{background:radial-gradient(ellipse at 50% 30%,#1a0820 0%,#0a0415 50%,#050208 100%)}
.bg-gradient.dog{background:radial-gradient(ellipse at 50% 80%,#001a10 0%,#010c08 60%,#020408 100%)}
.caustic{position:absolute;top:-20%;left:50%;transform:translateX(-50%);width:200%;height:60%;background:conic-gradient(from 180deg at 50% 0%,transparent 0deg,rgba(0,212,255,0.04) 10deg,transparent 20deg,rgba(79,255,212,0.03) 32deg,transparent 42deg,rgba(0,212,255,0.05) 55deg,transparent 65deg,rgba(79,255,212,0.03) 78deg,transparent 88deg,rgba(0,212,255,0.04) 100deg,transparent 110deg,rgba(79,255,212,0.02) 125deg,transparent 135deg,rgba(0,212,255,0.06) 150deg,transparent 160deg,transparent 360deg);animation:caustic-drift 12s ease-in-out infinite alternate;pointer-events:none}
@keyframes caustic-drift{0%{transform:translateX(-52%) rotate(-3deg) scaleX(0.95)}100%{transform:translateX(-48%) rotate(3deg) scaleX(1.05)}}
#particles{position:absolute;inset:0;pointer-events:none}
.particle{position:absolute;border-radius:50%;opacity:0;animation:float-up linear infinite}
@keyframes float-up{0%{opacity:0;transform:translateY(0) scale(0.5)}10%{opacity:0.6}80%{opacity:0.4}100%{opacity:0;transform:translateY(-100vh) scale(1.2)}}
.waves{position:absolute;bottom:0;left:0;width:100%;height:180px;overflow:hidden}
.wave{position:absolute;bottom:0;width:200%;height:100%;border-radius:45%;animation:wave-roll linear infinite}
.wave-1{background:rgba(0,212,255,0.06);animation-duration:8s;bottom:-10px}
.wave-2{background:rgba(79,255,212,0.05);animation-duration:12s;bottom:-20px;animation-direction:reverse}
.wave-3{background:rgba(13,59,110,0.35);animation-duration:10s;bottom:-30px}
@keyframes wave-roll{0%{transform:translateX(0) rotate(0deg)}100%{transform:translateX(-50%) rotate(360deg)}}

/* ── PAGE 1 ── */
#p1{gap:0}
#ocean-bg-zoom{position:fixed;inset:0;z-index:0;transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1)}
#ocean-bg-zoom.zoomed{transform:scale(1.08)}
.depth-rings{position:absolute;width:500px;height:500px;border-radius:50%;pointer-events:none}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,212,255,0.08);animation:pulse-ring 4s ease-in-out infinite}
.ring:nth-child(1){inset:0;animation-delay:0s}.ring:nth-child(2){inset:-40px;animation-delay:0.8s}.ring:nth-child(3){inset:-80px;animation-delay:1.6s}
@keyframes pulse-ring{0%,100%{border-color:rgba(0,212,255,0.06);transform:scale(1)}50%{border-color:rgba(0,212,255,0.18);transform:scale(1.02)}}
.brand{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:0.5em;text-transform:uppercase;opacity:0.5;margin-bottom:28px;text-shadow:0 0 20px var(--glow);animation:brand-fade 2s ease forwards}
@keyframes brand-fade{from{opacity:0;transform:translateY(-10px)}to{opacity:0.5;transform:translateY(0)}}
#enter-btn{position:relative;width:140px;height:140px;border-radius:50%;border:none;cursor:pointer;background:transparent;outline:none;animation:btn-appear 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both}
@keyframes btn-appear{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.btn-bubble{position:absolute;inset:0;border-radius:50%;background:radial-gradient(ellipse at 35% 30%,rgba(79,255,212,0.35) 0%,rgba(0,212,255,0.18) 30%,rgba(10,42,74,0.45) 70%,rgba(2,11,24,0.3) 100%);backdrop-filter:blur(12px) saturate(180%);-webkit-backdrop-filter:blur(12px) saturate(180%);border:1.5px solid rgba(79,255,212,0.5);box-shadow:0 0 40px rgba(0,212,255,0.25),0 0 80px rgba(0,212,255,0.1),inset 0 1px 2px rgba(255,255,255,0.35),inset 0 -1px 2px rgba(0,212,255,0.2);transition:all 0.3s ease}
.btn-bubble::before{content:'';position:absolute;top:12%;left:18%;width:40%;height:30%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.4) 0%,transparent 70%);filter:blur(3px)}
.btn-bubble::after{content:'';position:absolute;bottom:15%;right:12%;width:20%;height:14%;border-radius:50%;background:radial-gradient(ellipse,rgba(79,255,212,0.3) 0%,transparent 70%);filter:blur(2px)}
.btn-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:15px;letter-spacing:0.25em;color:var(--pearl);text-shadow:0 0 16px var(--glow),0 0 32px rgba(0,212,255,0.5);z-index:2}
#enter-btn:hover .btn-bubble{box-shadow:0 0 60px rgba(0,212,255,0.4),0 0 120px rgba(0,212,255,0.2),inset 0 1px 2px rgba(255,255,255,0.4),inset 0 -1px 2px rgba(0,212,255,0.3);border-color:rgba(79,255,212,0.8);transform:scale(1.04)}
#enter-btn:active .btn-bubble{transform:scale(0.96)}
#enter-btn.pressed{animation:btn-press 0.4s ease}
@keyframes btn-press{0%{transform:scale(1)}40%{transform:scale(0.92)}100%{transform:scale(1)}}
.subtitle{font-size:11px;color:rgba(232,244,248,0.35);letter-spacing:0.2em;margin-top:24px;font-weight:300}
#keypad-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;pointer-events:none;opacity:0}
#keypad-overlay.visible{pointer-events:all;opacity:1}
#keypad-bg{position:absolute;inset:0;background:rgba(2,11,24,0.6);backdrop-filter:blur(4px);opacity:0;transition:opacity 0.4s ease}
#keypad-overlay.visible #keypad-bg{opacity:1}
#keypad-panel{position:relative;z-index:1;width:100%;max-width:420px;background:linear-gradient(170deg,rgba(10,42,74,0.85) 0%,rgba(2,11,24,0.92) 100%);backdrop-filter:blur(24px) saturate(200%);-webkit-backdrop-filter:blur(24px) saturate(200%);border-top:1px solid rgba(0,212,255,0.3);border-left:1px solid rgba(0,212,255,0.15);border-right:1px solid rgba(0,212,255,0.15);border-radius:32px 32px 0 0;padding:32px 32px 48px;transform:translateY(100%);transition:transform 0.55s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 -20px 80px rgba(0,212,255,0.15),0 -4px 30px rgba(0,0,0,0.5)}
#keypad-overlay.visible #keypad-panel{transform:translateY(0)}
.panel-handle{width:48px;height:4px;background:rgba(0,212,255,0.3);border-radius:2px;margin:0 auto 24px}
.pin-display{display:flex;gap:16px;justify-content:center;margin-bottom:32px}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,212,255,0.4);background:transparent;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);position:relative;overflow:hidden}
.pin-dot.filled{background:var(--glow);border-color:var(--glow);box-shadow:0 0 16px var(--glow),0 0 32px rgba(0,212,255,0.4);transform:scale(1.15)}
.pin-dot.filled::before{content:'';position:absolute;top:2px;left:3px;width:6px;height:5px;border-radius:50%;background:rgba(255,255,255,0.5)}
.pin-dot.error{background:var(--coral);border-color:var(--coral);box-shadow:0 0 16px var(--coral)}
.pin-display.shake{animation:shake 0.5s cubic-bezier(.36,.07,.19,.97) both}
@keyframes shake{0%{transform:translateX(0)}10%{transform:translateX(-10px) rotate(-1deg)}20%{transform:translateX(10px) rotate(1deg)}30%{transform:translateX(-8px) rotate(-0.5deg)}40%{transform:translateX(8px) rotate(0.5deg)}50%{transform:translateX(-5px)}60%{transform:translateX(5px)}70%{transform:translateX(-3px)}80%{transform:translateX(3px)}100%{transform:translateX(0)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
.num-key{position:relative;height:68px;border-radius:16px;border:1px solid rgba(0,212,255,0.2);background:radial-gradient(ellipse at 40% 30%,rgba(26,92,154,0.3) 0%,rgba(10,42,74,0.5) 100%);backdrop-filter:blur(8px);cursor:pointer;font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--pearl);text-shadow:0 0 10px rgba(0,212,255,0.4);transition:all 0.15s ease;overflow:hidden;outline:none;display:flex;align-items:center;justify-content:center}
.num-key::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent)}
.num-key:hover{border-color:rgba(0,212,255,0.5);background:radial-gradient(ellipse at 40% 30%,rgba(26,92,154,0.5) 0%,rgba(10,42,74,0.7) 100%);box-shadow:0 0 20px rgba(0,212,255,0.2),inset 0 1px 0 rgba(255,255,255,0.1);transform:translateY(-1px)}
.num-key:active{transform:scale(0.93) translateY(1px);border-color:rgba(0,212,255,0.7)}
.num-sub{display:block;font-family:'Inter',sans-serif;font-size:7px;font-weight:400;letter-spacing:0.2em;color:rgba(232,244,248,0.4);margin-top:2px;text-transform:uppercase}
.num-key-inner{display:flex;flex-direction:column;align-items:center;line-height:1}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.action-key{height:68px;border-radius:16px;border:1px solid rgba(0,212,255,0.15);background:rgba(10,42,74,0.3);cursor:pointer;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:0.15em;color:rgba(232,244,248,0.55);transition:all 0.15s ease;outline:none;display:flex;align-items:center;justify-content:center;text-transform:uppercase}
.action-key:hover{border-color:rgba(0,212,255,0.35);color:var(--pearl);background:rgba(10,42,74,0.5)}
.action-key:active{transform:scale(0.94)}
#cancel-key{color:rgba(255,107,138,0.7);border-color:rgba(255,107,138,0.2)}
#cancel-key:hover{color:var(--coral);border-color:rgba(255,107,138,0.5);background:rgba(255,107,138,0.08)}
#confirm-key{background:radial-gradient(ellipse at 40% 30%,rgba(0,212,255,0.25) 0%,rgba(10,42,74,0.4) 100%);color:var(--glow);border-color:rgba(0,212,255,0.35);font-size:10px}
#confirm-key:hover{background:radial-gradient(ellipse at 40% 30%,rgba(0,212,255,0.4) 0%,rgba(10,42,74,0.6) 100%);box-shadow:0 0 20px rgba(0,212,255,0.3);color:var(--seafoam)}
#back-float{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100px);z-index:200;background:rgba(10,42,74,0.6);border:1px solid rgba(0,212,255,0.25);backdrop-filter:blur(16px);border-radius:16px 16px 0 0;padding:14px 40px 20px;cursor:pointer;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:0.25em;color:rgba(232,244,248,0.6);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1),color 0.2s;outline:none}
#back-float.visible{transform:translateX(-50%) translateY(0)}
#back-float:hover{color:var(--pearl)}
.ripple{position:absolute;border-radius:50%;background:rgba(0,212,255,0.35);transform:scale(0);animation:ripple-out 0.5s ease-out forwards;pointer-events:none}
@keyframes ripple-out{to{transform:scale(4);opacity:0}}

/* ── PAGE 2 ── */
#p2{background:transparent;justify-content:center;align-items:center;gap:0;padding:40px 24px}
.constellation{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:var(--pearl);animation:twinkle ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.15;transform:scale(1)}50%{opacity:0.7;transform:scale(1.4)}}
.heart-float{position:absolute;pointer-events:none;font-size:14px;animation:heart-drift linear infinite;opacity:0}
@keyframes heart-drift{0%{opacity:0;transform:translateY(0) rotate(-15deg) scale(0.8)}15%{opacity:0.7}85%{opacity:0.4}100%{opacity:0;transform:translateY(-80vh) rotate(15deg) scale(1.1)}}
.monthsary-card{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;text-align:center;max-width:380px;width:100%;padding:48px 36px 44px;background:linear-gradient(145deg,rgba(15,30,60,0.7) 0%,rgba(5,15,35,0.85) 50%,rgba(15,25,55,0.7) 100%);border:1px solid rgba(255,143,171,0.25);border-radius:28px;box-shadow:0 0 60px rgba(255,143,171,0.08),0 0 120px rgba(100,50,180,0.1),inset 0 1px 0 rgba(255,255,255,0.07);backdrop-filter:blur(20px);animation:card-rise 0.8s cubic-bezier(0.34,1.4,0.64,1) both}
@keyframes card-rise{from{opacity:0;transform:translateY(40px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.orb-wrap{position:relative;width:90px;height:90px;margin-bottom:28px}
.orb{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(255,209,255,0.7) 0%,rgba(180,100,255,0.5) 25%,rgba(80,40,180,0.6) 55%,rgba(20,10,60,0.9) 100%);box-shadow:0 0 40px rgba(180,100,255,0.5),0 0 80px rgba(100,50,200,0.3),inset 0 2px 4px rgba(255,255,255,0.4);animation:orb-breathe 3s ease-in-out infinite}
@keyframes orb-breathe{0%,100%{box-shadow:0 0 40px rgba(180,100,255,0.5),0 0 80px rgba(100,50,200,0.3),inset 0 2px 4px rgba(255,255,255,0.4)}50%{box-shadow:0 0 70px rgba(200,120,255,0.7),0 0 130px rgba(120,60,220,0.4),inset 0 2px 4px rgba(255,255,255,0.5)}}
.orb::before{content:'';position:absolute;top:15%;left:20%;width:35%;height:25%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.55) 0%,transparent 70%);filter:blur(3px)}
.orb-ring{position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(255,143,171,0.3);animation:ring-spin 8s linear infinite}
.orb-ring::after{content:'';position:absolute;top:-3px;left:calc(50% - 3px);width:6px;height:6px;border-radius:50%;background:var(--rose);box-shadow:0 0 10px var(--rose)}
@keyframes ring-spin{to{transform:rotate(360deg)}}
.date-badge{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.35em;color:rgba(255,143,171,0.6);text-transform:uppercase;margin-bottom:14px}
.monthsary-heading{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(26px,6vw,36px);font-weight:600;line-height:1.15;letter-spacing:0.01em;background:linear-gradient(135deg,#FFD166 0%,#FF8FAB 40%,#C77DFF 80%,#A0FAFF 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:shimmer-text 4s ease-in-out infinite alternate}
@keyframes shimmer-text{0%{filter:brightness(1)}100%{filter:brightness(1.25) drop-shadow(0 0 12px rgba(255,209,102,0.4))}}
.monthsary-sub{font-size:12px;color:rgba(232,244,248,0.4);letter-spacing:0.18em;text-transform:uppercase;margin-bottom:32px;font-weight:300}
.card-divider{width:60px;height:1px;margin-bottom:32px;background:linear-gradient(90deg,transparent,rgba(255,143,171,0.4),transparent)}
.month-btns{display:flex;gap:16px;width:100%}
.m-btn{flex:1;height:52px;border-radius:14px;border:none;cursor:pointer;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:0.18em;outline:none;position:relative;overflow:hidden;transition:all 0.2s ease;text-transform:uppercase}
.m-btn-open{background:linear-gradient(135deg,rgba(0,180,230,0.4) 0%,rgba(0,100,200,0.5) 100%);border:1px solid rgba(0,212,255,0.4);color:var(--glow);box-shadow:0 0 20px rgba(0,212,255,0.15)}
.m-btn-open:hover{background:linear-gradient(135deg,rgba(0,212,255,0.5) 0%,rgba(0,120,220,0.6) 100%);box-shadow:0 0 30px rgba(0,212,255,0.3);transform:translateY(-2px)}
.m-btn-close{background:linear-gradient(135deg,rgba(60,10,40,0.6) 0%,rgba(40,5,30,0.7) 100%);border:1px solid rgba(255,107,138,0.3);color:rgba(255,107,138,0.7)}
.m-btn-close:hover{border-color:rgba(255,107,138,0.5);color:var(--coral)}
.m-btn-close.vibrate{animation:btn-vibe 0.45s cubic-bezier(.36,.07,.19,.97)}
@keyframes btn-vibe{0%{transform:translateX(0) rotate(0deg)}15%{transform:translateX(-7px) rotate(-2deg)}30%{transform:translateX(7px) rotate(2deg)}45%{transform:translateX(-5px) rotate(-1deg)}60%{transform:translateX(5px) rotate(1deg)}75%{transform:translateX(-2px)}90%{transform:translateX(2px)}100%{transform:translateX(0) rotate(0deg)}}
.m-btn-close.unlocked{background:linear-gradient(135deg,rgba(0,212,255,0.3) 0%,rgba(79,255,212,0.2) 100%);border-color:rgba(79,255,212,0.5);color:var(--seafoam);animation:unlock-pulse 0.6s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes unlock-pulse{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.close-hint{position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:9px;color:rgba(255,107,138,0.5);letter-spacing:0.15em;white-space:nowrap;font-family:'Orbitron',monospace;transition:opacity 0.3s}

/* ── PAGE 3 ── */
#p3{padding:40px 24px;gap:0}
.seabed{position:absolute;bottom:0;left:0;width:100%;height:35%;overflow:hidden;pointer-events:none}
.seabed-glow{position:absolute;bottom:0;width:100%;height:60%;background:linear-gradient(0deg,rgba(0,80,100,0.3) 0%,transparent 100%)}
.anemone{position:absolute;bottom:0;display:flex;align-items:flex-end;gap:2px}
.tendril{width:3px;background:linear-gradient(0deg,rgba(0,212,255,0.6),rgba(79,255,212,0.2),transparent);border-radius:2px 2px 0 0;transform-origin:bottom center;animation:sway ease-in-out infinite alternate}
@keyframes sway{0%{transform:rotate(-8deg) scaleY(0.95)}100%{transform:rotate(8deg) scaleY(1.05)}}
#loader-wrap{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:24px;transition:opacity 0.6s ease,transform 0.6s ease}
#loader-wrap.fade-out{opacity:0;transform:scale(0.85) translateY(-20px);pointer-events:none}
.loader-ring-outer{position:relative;width:120px;height:120px}
.loader-ring-svg{position:absolute;inset:0;width:100%;height:100%;transform:rotate(-90deg)}
.ring-track{fill:none;stroke:rgba(0,212,255,0.1);stroke-width:3}
.ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:3;stroke-linecap:round;stroke-dasharray:345;stroke-dashoffset:345;transition:stroke-dashoffset 0.3s ease}
.loader-core{position:absolute;inset:16px;border-radius:50%;background:radial-gradient(ellipse at 40% 35%,rgba(0,212,255,0.2) 0%,rgba(5,15,35,0.9) 70%);border:1px solid rgba(0,212,255,0.15);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.loader-pct{font-family:'Orbitron',monospace;font-size:22px;font-weight:700;color:var(--glow);text-shadow:0 0 16px var(--glow);line-height:1}
.loader-pct-sym{font-family:'Orbitron',monospace;font-size:11px;color:rgba(0,212,255,0.5)}
.loader-label{font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.35em;color:rgba(0,212,255,0.5);text-transform:uppercase;animation:blink-label 1.8s ease-in-out infinite}
@keyframes blink-label{0%,100%{opacity:0.5}50%{opacity:1}}
.scan-line{position:absolute;bottom:-30px;left:-10px;right:-10px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,0.6),transparent);animation:scan 1.5s linear infinite}
@keyframes scan{0%{transform:translateY(0);opacity:0}10%{opacity:1}90%{opacity:0.8}100%{transform:translateY(-160px);opacity:0}}
#btn-grid{position:relative;z-index:5;display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:380px;opacity:0;pointer-events:none;margin-top:0}
#btn-grid.revealed{pointer-events:all}
.nav-btn{position:relative;border-radius:20px;border:none;cursor:pointer;overflow:hidden;outline:none;padding:0;height:160px;transform:translateY(60px) scale(0.9);opacity:0}
.nav-btn.pop-in{animation:nav-pop 0.7s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes nav-pop{from{opacity:0;transform:translateY(60px) scale(0.85) rotate(var(--tilt,0deg))}to{opacity:1;transform:translateY(0) scale(1) rotate(0deg)}}
.nav-btn-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 0 18px}
.nb-memories{background:radial-gradient(ellipse at 50% 20%,rgba(255,180,50,0.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,100,150,0.2) 0%,transparent 50%),linear-gradient(160deg,#0a1a2e 0%,#1a0a2e 50%,#0a0a1e 100%);border:1px solid rgba(255,180,50,0.2)}
.nb-memories .deco-shape{position:absolute;top:20px;right:22px;width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 40% 35%,rgba(255,220,100,0.9) 0%,rgba(255,150,50,0.7) 50%,rgba(200,80,20,0.4) 100%);box-shadow:0 0 20px rgba(255,200,50,0.5),0 0 40px rgba(255,150,30,0.2)}
.nb-memories .horizon{position:absolute;bottom:50px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,180,50,0.3),transparent)}
.nb-together{background:radial-gradient(ellipse at 30% 30%,rgba(180,100,255,0.25) 0%,transparent 55%),radial-gradient(ellipse at 70% 70%,rgba(0,212,255,0.2) 0%,transparent 50%),linear-gradient(135deg,#0a0a2e 0%,#150a30 50%,#050518 100%);border:1px solid rgba(180,100,255,0.2)}
.nb-together .orbit-wrap{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:60px;height:50px}
.nb-together .orb-a{position:absolute;width:22px;height:22px;border-radius:50%;top:0;left:0;background:radial-gradient(circle at 35% 30%,rgba(180,100,255,0.9) 0%,rgba(100,40,200,0.7) 100%);box-shadow:0 0 14px rgba(180,100,255,0.5);animation:orbit-a 4s ease-in-out infinite alternate}
.nb-together .orb-b{position:absolute;width:22px;height:22px;border-radius:50%;top:0;right:0;background:radial-gradient(circle at 35% 30%,rgba(0,212,255,0.9) 0%,rgba(0,100,200,0.7) 100%);box-shadow:0 0 14px rgba(0,212,255,0.5);animation:orbit-b 4s ease-in-out infinite alternate}
@keyframes orbit-a{to{transform:translate(8px,12px)}}@keyframes orbit-b{to{transform:translate(-8px,12px)}}
.nb-together .connector{position:absolute;top:11px;left:11px;right:11px;height:1px;background:linear-gradient(90deg,rgba(180,100,255,0.5),rgba(0,212,255,0.5));animation:connector-pulse 2s ease-in-out infinite}
@keyframes connector-pulse{0%,100%{opacity:0.4}50%{opacity:0.9}}
.nb-future{background:radial-gradient(ellipse at 50% 0%,rgba(79,255,212,0.2) 0%,transparent 55%),radial-gradient(ellipse at 20% 90%,rgba(0,212,255,0.15) 0%,transparent 50%),linear-gradient(170deg,#020e1a 0%,#031420 50%,#010a14 100%);border:1px solid rgba(79,255,212,0.2)}
.nb-future .grid-lines{position:absolute;inset:0;overflow:hidden;border-radius:20px}
.nb-future .grid-line{position:absolute;background:rgba(79,255,212,0.06)}
.nb-future .grid-line.h{left:0;right:0;height:1px}.nb-future .grid-line.v{top:0;bottom:0;width:1px}
.nb-future .data-node{position:absolute;border-radius:50%;background:var(--seafoam);box-shadow:0 0 10px var(--seafoam);animation:node-pulse 2s ease-in-out infinite}
@keyframes node-pulse{0%,100%{transform:scale(1);opacity:0.7}50%{transform:scale(1.5);opacity:1}}
.nb-notes{background:radial-gradient(ellipse at 60% 20%,rgba(255,143,171,0.2) 0%,transparent 55%),radial-gradient(ellipse at 30% 80%,rgba(255,200,100,0.12) 0%,transparent 50%),linear-gradient(150deg,#1a0a18 0%,#12060f 50%,#0a0408 100%);border:1px solid rgba(255,143,171,0.2)}
.nb-notes .letter-icon{position:absolute;top:16px;left:50%;transform:translateX(-50%);width:52px;height:38px;border:1.5px solid rgba(255,143,171,0.45);border-radius:4px;background:rgba(255,143,171,0.08)}
.nb-notes .letter-icon::before{content:'';position:absolute;top:0;left:0;right:0;height:0;border-left:26px solid transparent;border-right:26px solid transparent;border-top:18px solid rgba(255,143,171,0.25)}
.nb-notes .letter-icon::after{content:'';position:absolute;bottom:0;left:0;right:0;height:0;border-left:26px solid transparent;border-right:26px solid transparent;border-bottom:15px solid rgba(255,143,171,0.2)}
.nb-notes .heart-dot{position:absolute;bottom:12px;right:14px;font-size:11px;animation:heart-beat 1.5s ease-in-out infinite}
@keyframes heart-beat{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.nav-btn-label{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:rgba(232,244,248,0.7);text-shadow:0 1px 8px rgba(0,0,0,0.8);position:relative;z-index:2}
.nav-btn-sublabel{font-family:'Inter',sans-serif;font-size:8px;color:rgba(232,244,248,0.35);letter-spacing:0.1em;margin-top:3px;position:relative;z-index:2}
.nav-btn::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at var(--mx,50%) var(--my,50%),rgba(255,255,255,0.07) 0%,transparent 60%);border-radius:20px;opacity:0;transition:opacity 0.3s;pointer-events:none}
.nav-btn:hover::after{opacity:1}
.nav-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.4);transition:transform 0.2s ease,box-shadow 0.2s ease}
.nav-btn:active{transform:scale(0.96)}
.p3-title{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:0.5em;color:rgba(0,212,255,0.5);text-transform:uppercase;margin-bottom:24px;position:relative;z-index:5;opacity:0;transition:opacity 0.5s ease}
.p3-title.show{opacity:1}

/* ════════════════════════════════
   MUSIC PAGE
════════════════════════════════ */
#music-page{position:fixed;inset:0;z-index:20;display:flex;opacity:0;pointer-events:none;transition:opacity 0.5s ease;background:transparent}
#music-page.active{opacity:1;pointer-events:all}

/* Left disk area */
#music-disk-area{
  position:absolute;left:-90px;top:50%;transform:translateY(-50%);
  width:180px;height:180px;
  transition:left 0.7s cubic-bezier(0.34,1.2,0.64,1),opacity 0.5s ease;
  pointer-events:none;opacity:0;
}
#music-disk-area.visible{left:-85px;opacity:1}
.disk-wrap{
  position:relative;width:180px;height:180px;
  animation:disk-spin 4s linear infinite paused;
}
.disk-wrap.spinning{animation-play-state:running}
.disk{
  width:180px;height:180px;border-radius:50%;
  /* ═══ CHANGE DISK ART HERE ═══ */
  background:
    radial-gradient(circle at 50% 50%,#111 0%,#111 15%,transparent 16%),
    conic-gradient(
      #1a0a30 0deg,#2d1060 40deg,#0a1830 80deg,#1a3060 120deg,
      #2d0a50 160deg,#0a2040 200deg,#1a1060 240deg,#0a0a20 280deg,
      #2d1840 320deg,#1a0a30 360deg
    );
  border:3px solid rgba(0,212,255,0.3);
  box-shadow:
    0 0 30px rgba(0,212,255,0.2),
    inset 0 0 40px rgba(0,0,0,0.6),
    inset 0 0 10px rgba(0,212,255,0.1);
}
.disk::after{
  content:'';position:absolute;top:50%;left:50%;
  width:28px;height:28px;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,#1a1a2e 0%,#0d0d1a 60%,#00D4FF22 100%);
  border:2px solid rgba(0,212,255,0.5);
  box-shadow:0 0 12px rgba(0,212,255,0.4);
}
/* groove rings */
.disk::before{
  content:'';position:absolute;inset:20px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 0 0 12px rgba(255,255,255,0.03),0 0 0 24px rgba(255,255,255,0.02),0 0 0 36px rgba(255,255,255,0.015);
}
.disk-shadow{
  position:absolute;right:-10px;top:0;width:30px;height:100%;
  background:linear-gradient(90deg,rgba(0,0,0,0.4),transparent);
  border-radius:0 8px 8px 0;pointer-events:none;
}
@keyframes disk-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Music list panel */
#music-list-panel{
  position:absolute;right:0;top:0;bottom:0;width:100%;
  display:flex;flex-direction:column;
  transition:width 0.6s cubic-bezier(0.34,1.1,0.64,1),opacity 0.4s ease;
  overflow:hidden;
}
#music-list-panel.collapsed{width:6px;opacity:0.4}

.music-header{
  padding:32px 32px 20px;
  font-family:'Orbitron',monospace;font-size:10px;letter-spacing:0.4em;
  color:rgba(0,212,255,0.6);text-transform:uppercase;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.music-back-btn{
  background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.3);
  color:var(--glow);padding:8px 18px;border-radius:20px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.2em;
  transition:all 0.2s;outline:none;
}
.music-back-btn:hover{background:rgba(0,212,255,0.2);box-shadow:0 0 14px rgba(0,212,255,0.3)}

.music-list{
  flex:1;overflow-y:auto;padding:0 20px 20px;
  scrollbar-width:thin;scrollbar-color:rgba(0,212,255,0.2) transparent;
}
.music-list::-webkit-scrollbar{width:3px}
.music-list::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}

.music-item{
  display:flex;align-items:center;gap:16px;
  padding:14px 16px;border-radius:14px;cursor:pointer;
  margin-bottom:6px;
  border:1px solid transparent;
  background:rgba(255,255,255,0.02);
  transition:all 0.25s ease;
  position:relative;overflow:hidden;
}
.music-item::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,212,255,0.08),transparent);
  opacity:0;transition:opacity 0.3s;
}
.music-item:hover::before{opacity:1}
.music-item:hover{border-color:rgba(0,212,255,0.2);transform:translateX(4px)}
.music-item.playing{border-color:rgba(0,212,255,0.35);background:rgba(0,212,255,0.08)}
.music-item.playing::before{opacity:1}

.mi-num{
  font-family:'Orbitron',monospace;font-size:11px;
  color:rgba(0,212,255,0.4);width:24px;flex-shrink:0;
}
.music-item.playing .mi-num{color:var(--glow)}
.mi-art{
  width:44px;height:44px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  position:relative;overflow:hidden;
}
.mi-art::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 25%,rgba(255,255,255,0.2) 0%,transparent 60%);
}
.mi-info{flex:1;min-width:0}
.mi-title{font-size:13px;font-weight:500;color:var(--pearl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mi-artist{font-size:11px;color:rgba(232,244,248,0.4);margin-top:2px}
.mi-dur{font-family:'Orbitron',monospace;font-size:10px;color:rgba(232,244,248,0.3);flex-shrink:0}
.music-item.playing .mi-title{color:var(--glow)}

/* Now playing bottom bar */
#now-playing-bar{
  padding:16px 24px;
  background:rgba(0,5,15,0.7);backdrop-filter:blur(20px);
  border-top:1px solid rgba(0,212,255,0.15);
  flex-shrink:0;
}
.np-track{font-size:12px;color:var(--pearl);font-weight:500;margin-bottom:4px}
.np-artist{font-size:10px;color:rgba(0,212,255,0.5);font-family:'Orbitron',monospace;letter-spacing:0.15em}
.np-bar{height:2px;background:rgba(255,255,255,0.1);border-radius:1px;margin-top:10px;overflow:hidden}
.np-progress{height:100%;width:0%;background:linear-gradient(90deg,var(--glow),var(--seafoam));border-radius:1px;transition:width 0.5s linear}

/* Player screen (when song selected) */
#player-screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:0;
  opacity:0;pointer-events:none;
  transition:opacity 0.5s ease;
}
#player-screen.visible{opacity:1;pointer-events:all}

.player-bg-vid{
  position:absolute;inset:0;overflow:hidden;
}
.player-bg-vid video{
  width:100%;height:100%;object-fit:cover;opacity:0.15;
}
.player-vid-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,5,20,0.7) 0%,rgba(0,2,10,0.4) 50%,rgba(0,5,20,0.8) 100%);
}

/* Animated CSS video bg fallback */
.player-css-bg{
  position:absolute;inset:0;overflow:hidden;
}
.css-bg-anim{
  position:absolute;inset:0;
  animation:bg-shift 8s ease-in-out infinite alternate;
}
@keyframes bg-shift{
  0%{background:radial-gradient(ellipse at 20% 30%,var(--c1,#001830) 0%,#000508 70%)}
  100%{background:radial-gradient(ellipse at 80% 70%,var(--c2,#001020) 0%,#000305 70%)}
}

.player-content{
  position:relative;z-index:2;
  flex:1;display:flex;flex-direction:column;
  align-items:center;padding:40px 30px 20px;
}
.player-back{
  align-self:flex-start;background:rgba(0,212,255,0.1);
  border:1px solid rgba(0,212,255,0.3);color:var(--glow);
  padding:8px 18px;border-radius:20px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.2em;
  transition:all 0.2s;outline:none;margin-bottom:24px;
}
.player-back:hover{background:rgba(0,212,255,0.2)}

.player-track-name{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(22px,5vw,32px);color:var(--pearl);
  text-align:center;margin-bottom:6px;
  text-shadow:0 0 30px rgba(0,212,255,0.3);
}
.player-artist{
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.3em;
  color:rgba(0,212,255,0.5);margin-bottom:30px;
}
.player-controls{
  display:flex;align-items:center;gap:28px;margin-top:auto;
}
.ctrl-btn{
  background:none;border:none;cursor:pointer;
  color:rgba(232,244,248,0.5);font-size:22px;
  transition:all 0.2s;outline:none;padding:8px;
}
.ctrl-btn:hover{color:var(--glow);transform:scale(1.15)}
.ctrl-play{
  width:56px;height:56px;border-radius:50%;
  background:radial-gradient(ellipse at 40% 35%,rgba(0,212,255,0.4),rgba(0,80,160,0.6));
  border:1.5px solid rgba(0,212,255,0.5);
  color:var(--pearl);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(0,212,255,0.25);
  transition:all 0.2s;outline:none;cursor:pointer;
}
.ctrl-play:hover{box-shadow:0 0 35px rgba(0,212,255,0.4);transform:scale(1.08)}

.player-progress-wrap{width:100%;margin-top:24px}
.player-bar{height:3px;background:rgba(255,255,255,0.1);border-radius:2px;cursor:pointer;position:relative}
.player-fill{height:100%;background:linear-gradient(90deg,var(--glow),var(--seafoam));border-radius:2px;pointer-events:none;transition:width 0.4s linear}
.player-times{display:flex;justify-content:space-between;font-family:'Orbitron',monospace;font-size:9px;color:rgba(232,244,248,0.4);margin-top:6px}

/* ════════════════════════════════
   LETTER PAGE
════════════════════════════════ */
#letter-page{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.6s ease;padding:20px}
#letter-page.active{opacity:1;pointer-events:all}

.letter-bg-stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.letter-star{position:absolute;border-radius:50%;background:white;animation:letter-twinkle ease-in-out infinite}
@keyframes letter-twinkle{0%,100%{opacity:0.1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}

.letter-envelope-outer{
  position:relative;width:100%;max-width:480px;
  animation:letter-float 4s ease-in-out infinite alternate;
}
@keyframes letter-float{0%{transform:translateY(0px) rotate(-0.3deg)}100%{transform:translateY(-8px) rotate(0.3deg)}}

.letter-scroll{
  background:linear-gradient(160deg,
    rgba(20,8,35,0.92) 0%,rgba(12,4,22,0.96) 40%,rgba(18,6,30,0.94) 100%
  );
  border:1px solid rgba(255,143,171,0.2);
  border-radius:16px;
  padding:36px 36px 28px;
  box-shadow:
    0 0 60px rgba(200,100,255,0.08),
    0 20px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  max-height:80vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(255,143,171,0.2) transparent;
}
.letter-scroll::-webkit-scrollbar{width:3px}
.letter-scroll::-webkit-scrollbar-thumb{background:rgba(255,143,171,0.2);border-radius:2px}

.letter-top-deco{
  display:flex;align-items:center;gap:12px;
  margin-bottom:24px;
}
.letter-seal{
  width:36px;height:36px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,rgba(255,150,200,0.9),rgba(180,60,150,0.7),rgba(100,20,80,0.9));
  border:1px solid rgba(255,143,171,0.4);
  box-shadow:0 0 16px rgba(255,143,171,0.3);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
}
.letter-date{
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.3em;
  color:rgba(255,143,171,0.5);
}

.letter-body{
  font-family:'Dancing Script',cursive;
  font-size:clamp(16px,3.5vw,20px);
  line-height:1.9;color:rgba(232,220,240,0.88);
  user-select:none;-webkit-user-select:none;pointer-events:none;
}
.letter-body p{margin-bottom:1.2em}
.letter-body .highlight{
  color:var(--rose);
  text-shadow:0 0 12px rgba(255,143,171,0.4);
}

/* Line reveal animation */
.letter-line{
  opacity:0;transform:translateY(8px);
  animation:line-appear 0.6s ease forwards;
}
@keyframes line-appear{to{opacity:1;transform:translateY(0)}}

.letter-sig{
  font-family:'Dancing Script',cursive;
  font-size:clamp(20px,4vw,26px);
  color:var(--rose);margin-top:20px;
  text-shadow:0 0 16px rgba(255,143,171,0.4);
  text-align:right;
  pointer-events:none;user-select:none;
}

.letter-back-wrap{
  display:flex;justify-content:center;margin-top:24px;
  opacity:0;transition:opacity 0.5s ease;
}
.letter-back-wrap.show{opacity:1}
.letter-back-btn-main{
  background:linear-gradient(135deg,rgba(255,143,171,0.15),rgba(180,80,150,0.2));
  border:1px solid rgba(255,143,171,0.35);
  color:var(--rose);padding:12px 36px;border-radius:24px;
  cursor:pointer;font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:0.25em;transition:all 0.2s;outline:none;
}
.letter-back-btn-main:hover{background:linear-gradient(135deg,rgba(255,143,171,0.25),rgba(180,80,150,0.3));box-shadow:0 0 20px rgba(255,143,171,0.2)}

/* ════════════════════════════════
   REASONS PAGE
════════════════════════════════ */
#reasons-page{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.6s ease;padding:20px}
#reasons-page.active{opacity:1;pointer-events:all}
.reasons-scroll{
  background:linear-gradient(160deg,rgba(10,42,74,0.85) 0%,rgba(2,11,24,0.94) 60%,rgba(5,15,28,0.96) 100%);
  border:1px solid rgba(0,212,255,0.2);
  border-radius:16px;padding:32px 28px 24px;
  box-shadow:0 0 60px rgba(0,212,255,0.08),0 20px 80px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  width:100%;max-width:480px;max-height:80vh;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:rgba(0,212,255,0.2) transparent;
}
.reasons-scroll::-webkit-scrollbar{width:3px}
.reasons-scroll::-webkit-scrollbar-thumb{background:rgba(0,212,255,0.2);border-radius:2px}
.reasons-title{
  font-family:'Orbitron',monospace;font-size:13px;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--seafoam);text-shadow:0 0 16px rgba(79,255,212,0.4);text-align:center;margin-bottom:24px;
}
.reason-item{
  display:flex;align-items:flex-start;gap:12px;padding:14px 4px;
  border-bottom:1px solid rgba(0,212,255,0.08);
  font-family:'Playfair Display',serif;font-style:italic;font-size:15px;line-height:1.6;
  color:rgba(232,244,248,0.85);
  opacity:0;transform:translateY(10px);animation:reason-appear 0.6s ease forwards;
}
.reason-item:last-child{border-bottom:none}
.reason-num{

  font-family:'Orbitron',monospace;font-size:11px;font-weight:700;color:var(--seafoam);
  text-shadow:0 0 8px rgba(79,255,212,0.5);
}
@keyframes reason-appear{to{opacity:1;transform:translateY(0)}}
.reasons-back-wrap{display:flex;justify-content:center;margin-top:24px;opacity:0;transition:opacity 0.5s ease}
.reasons-back-wrap.show{opacity:1}
.reasons-back-btn-main{
  background:linear-gradient(135deg,rgba(79,255,212,0.15),rgba(0,212,255,0.2));
  border:1px solid rgba(0,212,255,0.35);
  color:var(--seafoam);padding:12px 36px;border-radius:24px;
  cursor:pointer;font-family:'Orbitron',monospace;font-size:9px;
  letter-spacing:0.25em;transition:all 0.2s;outline:none;
}
.reasons-back-btn-main:hover{background:linear-gradient(135deg,rgba(79,255,212,0.25),rgba(0,212,255,0.3));box-shadow:0 0 20px rgba(0,212,255,0.2)}

/* ════════════════════════════════
   DOG PAGE
════════════════════════════════ */
#dog-page{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.6s ease;padding:20px}
#dog-page.active{opacity:1;pointer-events:all}

/* Grass ground */
.dog-ground{
  position:absolute;bottom:0;left:0;right:0;height:120px;
  background:linear-gradient(0deg,rgba(0,40,20,0.8) 0%,rgba(0,30,15,0.4) 60%,transparent 100%);
  overflow:hidden;
}
.grass-blade{position:absolute;bottom:0;transform-origin:bottom center;animation:grass-sway 2s ease-in-out infinite alternate}
@keyframes grass-sway{0%{transform:rotate(-5deg)}100%{transform:rotate(5deg)}}

.dog-scene{
  position:relative;z-index:5;display:flex;align-items:flex-end;
  width:100%;max-width:420px;margin-bottom:20px;gap:0;
}

/* ═══ CSS DOG ═══ */
#css-dog{
  position:relative;width:130px;height:130px;flex-shrink:0;
  transition:transform 0.3s ease;
}

/* body */
.dog-body{
  position:absolute;bottom:18px;left:18px;
  width:88px;height:62px;
  background:radial-gradient(ellipse at 40% 35%,#c8a878 0%,#a07848 60%,#805a30 100%);
  border-radius:40px 40px 35px 35px;
  box-shadow:inset 0 -6px 12px rgba(0,0,0,0.3),0 4px 12px rgba(0,0,0,0.3);
}
/* belly */
.dog-belly{
  position:absolute;bottom:20px;left:30px;width:56px;height:40px;
  background:radial-gradient(ellipse,#e8c898 0%,rgba(220,185,130,0) 75%);
  border-radius:50%;
}
/* head */
.dog-head{
  position:absolute;bottom:62px;left:24px;
  width:72px;height:65px;
  background:radial-gradient(ellipse at 45% 35%,#c8a878 0%,#a07848 70%,#805a30 100%);
  border-radius:40% 40% 38% 38%;
  box-shadow:inset 0 -4px 8px rgba(0,0,0,0.2),0 2px 8px rgba(0,0,0,0.3);
  transition:transform 0.4s ease;
}
/* ears */
.dog-ear-l,.dog-ear-r{
  position:absolute;top:-14px;width:24px;height:30px;
  background:radial-gradient(ellipse,#9a6838,#704820);
  border-radius:50% 50% 40% 40%;
  transition:transform 0.4s ease;
}
.dog-ear-l{left:6px;transform:rotate(-10deg);transform-origin:bottom right}
.dog-ear-r{right:6px;transform:rotate(10deg);transform-origin:bottom left}
/* muzzle */
.dog-muzzle{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  width:38px;height:28px;
  background:radial-gradient(ellipse,#d8b888,#b89060);
  border-radius:50% 50% 45% 45%;
}
/* nose */
.dog-nose{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  width:14px;height:9px;
  background:radial-gradient(ellipse at 40% 35%,#442222,#221111);
  border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,0.4);
}
/* eyes */
.dog-eye-l,.dog-eye-r{
  position:absolute;top:18px;width:14px;height:14px;
  background:radial-gradient(circle at 40% 35%,#442200 0%,#221100 60%,#000 100%);
  border-radius:50%;
  box-shadow:inset 0 1px 3px rgba(255,255,255,0.15),0 0 0 2px rgba(120,80,30,0.4);
  transition:transform 0.3s ease,height 0.3s ease;
  overflow:hidden;
}
.dog-eye-l{left:10px}.dog-eye-r{right:10px}
.dog-eye-shine{position:absolute;top:2px;left:3px;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.7)}
/* mouth */
.dog-mouth{
  position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  width:20px;height:8px;overflow:hidden;
}
.dog-smile{
  position:absolute;top:-4px;left:0;width:20px;height:14px;
  border:2.5px solid rgba(80,30,0,0.5);border-radius:0 0 12px 12px;
  border-top:none;transition:all 0.3s ease;
}
/* tongue */
.dog-tongue{
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  width:14px;height:16px;
  background:radial-gradient(ellipse,#ff8888,#dd5555);
  border-radius:50% 50% 50% 50%;
  opacity:0;transition:opacity 0.3s ease,bottom 0.3s ease;
}
/* tail */
.dog-tail{
  position:absolute;bottom:18px;right:10px;
  width:16px;height:38px;
  background:linear-gradient(180deg,#a07848,#805a30);
  border-radius:8px;
  transform-origin:bottom center;
  transform:rotate(30deg);
  animation:tail-idle 1.5s ease-in-out infinite alternate;
}
@keyframes tail-idle{0%{transform:rotate(20deg)}100%{transform:rotate(45deg)}}
/* legs */
.dog-leg{
  position:absolute;bottom:0;width:18px;height:24px;
  background:linear-gradient(180deg,#a07848,#805a30);
  border-radius:4px 4px 6px 6px;
}
.dog-leg-fl{left:24px;bottom:8px}.dog-leg-fr{left:48px;bottom:8px}
.dog-leg-bl{left:74px;bottom:8px}.dog-leg-br{left:90px;bottom:8px}

/* DOG STATES */
#css-dog.happy .dog-tail{animation:tail-wag 0.3s ease-in-out infinite alternate}
@keyframes tail-wag{0%{transform:rotate(10deg)}100%{transform:rotate(60deg)}}
#css-dog.happy .dog-tongue{opacity:1;bottom:-4px}
#css-dog.happy .dog-eye-l,#css-dog.happy .dog-eye-r{height:10px;border-radius:50% 50% 0 0}
#css-dog.happy .dog-smile{border-bottom-left-radius:10px;border-bottom-right-radius:10px;width:22px}
#css-dog.happy .dog-head{animation:head-bop 0.4s ease-in-out infinite alternate}
@keyframes head-bop{0%{transform:rotate(-5deg)}100%{transform:rotate(5deg)}}
#css-dog.happy .dog-ear-l{animation:ear-flap-l 0.5s ease-in-out infinite alternate}
#css-dog.happy .dog-ear-r{animation:ear-flap-r 0.5s ease-in-out infinite alternate}
@keyframes ear-flap-l{0%{transform:rotate(-15deg)}100%{transform:rotate(5deg)}}
@keyframes ear-flap-r{0%{transform:rotate(15deg)}100%{transform:rotate(-5deg)}}

#css-dog.sad .dog-ear-l{transform:rotate(-30deg) translateY(5px)}
#css-dog.sad .dog-ear-r{transform:rotate(30deg) translateY(5px)}
#css-dog.sad .dog-eye-l,#css-dog.sad .dog-eye-r{height:8px;border-radius:0 0 50% 50%}
#css-dog.sad .dog-smile{transform:scaleY(-0.8) translateY(-6px);border-radius:12px 12px 0 0;border-top:2.5px solid rgba(80,30,0,0.5);border-bottom:none}
#css-dog.sad .dog-tail{animation:tail-droop 2s ease-in-out infinite alternate}
@keyframes tail-droop{0%{transform:rotate(-20deg)}100%{transform:rotate(-40deg)}}

#css-dog.bark{animation:dog-bark 0.15s ease-in-out 3}
@keyframes dog-bark{0%{transform:translateY(0) rotate(0)}25%{transform:translateY(-8px) rotate(-3deg)}50%{transform:translateY(0) rotate(0)}75%{transform:translateY(-5px) rotate(2deg)}100%{transform:translateY(0)}}

#css-dog.excited{animation:dog-bounce 0.5s ease-in-out infinite}
@keyframes dog-bounce{0%{transform:translateY(0) scaleY(1)}30%{transform:translateY(-18px) scaleY(0.92)}60%{transform:translateY(0) scaleY(1.05)}100%{transform:translateY(0) scaleY(1)}}

#css-dog.sleep .dog-eye-l,#css-dog.sleep .dog-eye-r{height:2px;border-radius:2px}
#css-dog.sleep .dog-head{animation:head-nod 3s ease-in-out infinite}
@keyframes head-nod{0%,100%{transform:rotate(0)}50%{transform:rotate(8deg)}}

/* speech bubble */
.dog-bubble{
  position:absolute;top:-10px;left:60%;
  background:rgba(255,255,255,0.92);color:#333;
  padding:8px 14px;border-radius:14px;
  font-size:13px;font-weight:500;
  white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);
  opacity:0;transform:scale(0.8) translateY(8px);
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;z-index:10;
}
.dog-bubble.show{opacity:1;transform:scale(1) translateY(0)}
.dog-bubble::before{
  content:'';position:absolute;bottom:-8px;left:16px;
  border:8px solid transparent;border-top:8px solid rgba(255,255,255,0.92);
  border-bottom:none;
}

/* dog scene right side: empty (sound wave when barking) */
.sound-waves{
  position:absolute;right:-10px;top:40%;
  display:flex;gap:3px;align-items:center;
  opacity:0;transition:opacity 0.3s;
}
.sound-waves.visible{opacity:1}
.sw-bar{width:3px;background:var(--seafoam);border-radius:2px;animation:sw-bounce 0.4s ease-in-out infinite alternate}
.sw-bar:nth-child(1){height:8px;animation-delay:0s}
.sw-bar:nth-child(2){height:14px;animation-delay:0.1s}
.sw-bar:nth-child(3){height:20px;animation-delay:0.05s}
.sw-bar:nth-child(4){height:12px;animation-delay:0.15s}
@keyframes sw-bounce{0%{transform:scaleY(0.5)}100%{transform:scaleY(1.2)}}

/* chat area */
.dog-chat-area{
  position:relative;z-index:5;
  width:100%;max-width:420px;
  display:flex;flex-direction:column;gap:12px;
}
.dog-chat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:8px;
  border-bottom:1px solid rgba(79,255,212,0.15);
}
.dog-chat-title{
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:0.3em;
  color:rgba(79,255,212,0.6);
}
.dog-back-btn{
  background:rgba(79,255,212,0.1);border:1px solid rgba(79,255,212,0.25);
  color:var(--seafoam);padding:6px 14px;border-radius:16px;
  cursor:pointer;font-family:'Orbitron',monospace;font-size:8px;letter-spacing:0.2em;
  transition:all 0.2s;outline:none;
}
.dog-back-btn:hover{background:rgba(79,255,212,0.2)}

.dog-messages{
  min-height:60px;max-height:120px;overflow-y:auto;
  display:flex;flex-direction:column;gap:8px;
  scrollbar-width:none;
}
.dog-messages::-webkit-scrollbar{display:none}
.dog-msg{
  font-size:13px;padding:8px 14px;border-radius:16px;
  max-width:85%;word-break:break-word;
  animation:msg-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes msg-pop{from{opacity:0;transform:scale(0.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.dog-msg.user{
  align-self:flex-end;
  background:linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,130,200,0.25));
  border:1px solid rgba(0,212,255,0.25);color:var(--pearl);
}
.dog-msg.dog-reply{
  align-self:flex-start;
  background:linear-gradient(135deg,rgba(79,255,212,0.12),rgba(0,180,130,0.15));
  border:1px solid rgba(79,255,212,0.2);color:rgba(232,244,248,0.9);
}

.dog-input-row{
  display:flex;gap:8px;align-items:center;
}
.dog-input{
  flex:1;background:rgba(0,20,15,0.6);border:1px solid rgba(79,255,212,0.2);
  border-radius:24px;padding:12px 18px;color:var(--pearl);
  font-size:13px;font-family:'Inter',sans-serif;
  outline:none;transition:border-color 0.2s;
}
.dog-input:focus{border-color:rgba(79,255,212,0.5);box-shadow:0 0 12px rgba(79,255,212,0.1)}
.dog-input::placeholder{color:rgba(232,244,248,0.25)}
.dog-send-btn{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(79,255,212,0.25),rgba(0,180,130,0.3));
  border:1px solid rgba(79,255,212,0.35);color:var(--seafoam);
  cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;outline:none;
}
.dog-send-btn:hover{background:linear-gradient(135deg,rgba(79,255,212,0.4),rgba(0,180,130,0.45));box-shadow:0 0 16px rgba(79,255,212,0.3)}

/* paw prints decoration */
.paw-print{position:absolute;font-size:16px;opacity:0.12;pointer-events:none;animation:paw-fade 4s ease-in-out infinite}
@keyframes paw-fade{0%,100%{opacity:0.08}50%{opacity:0.2}}
</style>

enterBtn.addEventListener('click',()=>{
  if(isKeypadOpen) return;
  enterBtn.classList.add('pressed');
  setTimeout(()=>enterBtn.classList.remove('pressed'),400);
  zoomEl.classList.add('zoomed');
  setTimeout(()=>{ isKeypadOpen=true; kOverlay.classList.add('visible'); document.getElementById('back-float').classList.add('visible'); },250);
});
function closeKeypad(){ isKeypadOpen=false; kOverlay.classList.remove('visible'); document.getElementById('back-float').classList.remove('visible'); zoomEl.classList.remove('zoomed'); pin=''; updateDots(); }
document.getElementById('cancel-key').addEventListener('click',closeKeypad);

document.getElementById('numpad').addEventListener('click',handleNum);
document.querySelector('.bottom-row').addEventListener('click',e=>{ if(e.target.closest('[data-num]')) handleNum(e); });
document.getElementById('confirm-key').addEventListener('click',()=>{ if(pin.length===4) checkPin(); });
function handleNum(e){
  const k=e.target.closest('[data-num]');
  if(!k||pin.length>=4) return;
  pin+=k.dataset.num; updateDots(); addRipple(k,e);
  if(pin.length===4) setTimeout(checkPin,150);
}
function addRipple(el,e){
  const r=document.createElement('span'); r.className='ripple';
  const rect=el.getBoundingClientRect(),sz=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${(e.clientX||rect.left+rect.width/2)-rect.left-sz/2}px;top:${(e.clientY||rect.top+rect.height/2)-rect.top-sz/2}px`;
  el.appendChild(r); setTimeout(()=>r.remove(),500);
}
function updateDots(){ dots.forEach((d,i)=>{ d.classList.remove('filled','error'); if(i<pin.length) d.classList.add('filled'); }); }
function checkPin(){
  if(pin===PASSWORD){ dots.forEach(d=>{ d.classList.remove('error'); d.classList.add('filled'); }); setTimeout(()=>{ closeKeypad(); goToPage2(); },400); }
  else { dots.forEach(d=>{ d.classList.remove('filled'); d.classList.add('error'); }); pinDisp.classList.add('shake'); setTimeout(()=>{ pinDisp.classList.remove('shake'); dots.forEach(d=>d.classList.remove('error')); pin=''; updateDots(); },600); }
}
document.addEventListener('keydown',e=>{
  if(!isKeypadOpen) return;
  if(e.key>='0'&&e.key<='9'&&pin.length<4){ pin+=e.key; updateDots(); if(pin.length===4) setTimeout(checkPin,150); }
  if(e.key==='Backspace'){ pin=pin.slice(0,-1); updateDots(); }
  if(e.key==='Enter'&&pin.length===4) checkPin();
  if(e.key==='Escape') closeKeypad();
});

let loaderDone=false;
function startLoader(){
  if(loaderDone) return;
  const ringFill=document.getElementById('ring-fill');
  const pctEl=document.getElementById('loader-pct');
  const loaderWrap=document.getElementById('loader-wrap');
  const btnGrid=document.getElementById('btn-grid');
  const p3Title=document.getElementById('p3-title');
  const circ=2*Math.PI*54;
  let start=null;
  function tick(ts){
    if(!start) start=ts;
    const prog=Math.min((ts-start)/20000,1);
    pctEl.textContent=Math.floor(prog*100);
    ringFill.style.strokeDasharray=circ;
    ringFill.style.strokeDashoffset=circ*(1-prog);
    if(prog<1){ requestAnimationFrame(tick); return; }
    loaderDone=true;
    loaderWrap.classList.add('fade-out');
    setTimeout(()=>{
      loaderWrap.style.display='none'; p3Title.classList.add('show');
      btnGrid.classList.add('revealed'); btnGrid.style.opacity='1';
      ['nb1','nb2','nb3','nb4'].forEach((id,i)=>setTimeout(()=>{ const b=document.getElementById(id); b.classList.add('pop-in'); b.style.opacity='1'; b.style.transform='none'; },i*140));
    },600);
  }
  requestAnimationFrame(tick);
}

  item.innerHTML=`<div class="mi-num">${String(i+1).padStart(2,'0')}</div>
    <div class="mi-art" style="background:radial-gradient(ellipse at 35% 30%,rgba(255,255,255,0.15),transparent 70%),linear-gradient(135deg,${s.c1},${s.c2})">${s.emoji}</div>
    <div class="mi-info"><div class="mi-title">${s.title}</div><div class="mi-artist">${s.artist}</div></div>
    <div class="mi-dur">${s.dur}</div>`;
  item.addEventListener('click',()=>openSong(i));
  musicList.appendChild(item);
});

document.getElementById('music-back-btn').addEventListener('click',()=>{
  audio.pause();
  backToP3('music-page');
});

function parseDur(d){ const p=d.split(':'); return parseInt(p[0])*60+parseInt(p[1]); }
function fmtTime(s){ return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

function openSong(idx){
  currentSong=idx; const s=SONGS[idx];
  // collapse list, show disk + player
  document.getElementById('music-list-panel').classList.add('collapsed');
  document.getElementById('music-disk-area').classList.add('visible');
  document.getElementById('disk-wrap').classList.add('spinning');
  const ps=document.getElementById('player-screen'); ps.classList.add('visible');
  document.getElementById('player-track-name').textContent=s.title;
  document.getElementById('player-artist-name').textContent=s.artist;
  document.getElementById('pt-dur').textContent=s.dur;
  // update bg color
  const anim=document.getElementById('css-bg-anim');
  anim.style.setProperty('--c1',s.c1);
  anim.style.setProperty('--c2',s.c2);
  // highlight list
  document.querySelectorAll('.music-item').forEach((el,i)=>el.classList.toggle('playing',i===idx));
  document.getElementById('np-track').textContent=s.title;
  document.getElementById('np-artist').textContent=s.artist;

  // ── REAL AUDIO ──
  audio.pause();
  if(s.src){
    audio.src=s.src;
    audio.load();
    audio.play().catch(()=>{});
    isPlaying=true;
  } else {
    // No file yet — show placeholder state, disk still spins visually
    audio.src='';
    isPlaying=true; // visual only
  }
  document.getElementById('ctrl-play').textContent='⏸';
  document.getElementById('disk-wrap').classList.add('spinning');
}

// Update progress bar & time display from real audio
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  const pct=(audio.currentTime/audio.duration)*100;
  document.getElementById('player-fill').style.width=pct+'%';
  document.getElementById('np-progress').style.width=pct+'%';
  document.getElementById('pt-cur').textContent=fmtTime(Math.floor(audio.currentTime));
  document.getElementById('pt-dur').textContent=fmtTime(Math.floor(audio.duration));
});

// Click on progress bar to seek
document.getElementById('player-bar').addEventListener('click',e=>{
  if(!audio.duration) return;
  const rect=e.currentTarget.getBoundingClientRect();
  audio.currentTime=((e.clientX-rect.left)/rect.width)*audio.duration;
});

// Auto-advance to next song
audio.addEventListener('ended',()=>openSong((currentSong+1)%SONGS.length));

document.getElementById('player-back').addEventListener('click',()=>{
  audio.pause();
  document.getElementById('player-screen').classList.remove('visible');
  document.getElementById('music-list-panel').classList.remove('collapsed');
  document.getElementById('music-disk-area').classList.remove('visible');
  document.getElementById('disk-wrap').classList.remove('spinning');
  isPlaying=false;
  document.getElementById('player-fill').style.width='0%';
  document.getElementById('np-progress').style.width='0%';
  document.getElementById('pt-cur').textContent='0:00';
});

document.getElementById('ctrl-play').addEventListener('click',()=>{
  if(audio.src && audio.src !== window.location.href){
    if(audio.paused){ audio.play().catch(()=>{}); isPlaying=true; }
    else { audio.pause(); isPlaying=false; }
  } else {
    isPlaying=!isPlaying; // visual toggle only when no src
  }
  document.getElementById('ctrl-play').textContent=isPlaying?'⏸':'▶';
  document.getElementById('disk-wrap').classList.toggle('spinning',isPlaying);
});

document.getElementById('ctrl-next').addEventListener('click',()=>openSong((currentSong+1)%SONGS.length));
document.getElementById('ctrl-prev').addEventListener('click',()=>openSong((currentSong-1+SONGS.length)%SONGS.length));

const DEFAULT_REPLIES=["*tilts head* 🐕","Woof! Tell me more! 🐾","*wags tail thoughtfully*","Buddy is listening… 👂🐕","*perks ears up* I'm here! 🐾"];

function setDogState(state, sound){
  dog.className=''; // clear all state classes
  void dog.offsetWidth;
  if(sound==='bark'){ dog.classList.add('bark'); soundWaves.classList.add('visible'); setTimeout(()=>soundWaves.classList.remove('visible'),1500); }
  else { soundWaves.classList.remove('visible'); }
  setTimeout(()=>{ dog.className=state==='excited'?'excited bark':state; },100);
}

function showBubble(text){
  dogBubble.textContent=text; dogBubble.classList.add('show');
  setTimeout(()=>dogBubble.classList.remove('show'),3500);
}

function addMessage(text,type){
  const div=document.createElement('div'); div.className='dog-msg '+type; div.textContent=text;
  dogMessages.appendChild(div);
  dogMessages.scrollTop=dogMessages.scrollHeight;
}

function respondToDog(userText){
  const lower=userText.toLowerCase();
  let matched=null;
  for(const [key,val] of Object.entries(DOG_RESPONSES)){
    if(lower.includes(key)){ matched=val; break; }
  }
  const reply=matched ? matched.replies[Math.floor(Math.random()*matched.replies.length)] : DEFAULT_REPLIES[Math.floor(Math.random()*DEFAULT_REPLIES.length)];
  const state=matched ? matched.state : 'happy';
  const sound=matched ? matched.sound : 'soft';

  setTimeout(()=>{
    setDogState(state, sound);
    showBubble(reply.replace(/\s*[^\x00-\x7F]+\s*/g,'').trim() || reply);
    addMessage(reply, 'dog-reply');
  },400);
}

function sendDogMessage(){
  const text=dogInput.value.trim();
  if(!text) return;
  addMessage(text,'user');
  dogInput.value='';
  respondToDog(text);
}
document.getElementById('dog-send-btn').addEventListener('click',sendDogMessage);
dogInput.addEventListener('keydown',e=>{ if(e.key==='Enter') sendDogMessage(); });
document.getElementById('dog-back-btn').addEventListener('click',()=>backToP3('dog-page'));
